[graph]
all-features = true

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = [
  # Transitive via async-openai/backoff chain; no maintained safe upgrade path in current dependency graph.
  "RUSTSEC-2025-0012", # backoff unmaintained
  "RUSTSEC-2024-0384", # instant unmaintained
  # Transitive via DataFusion macro stack; currently no safe upgrade path.
  "RUSTSEC-2024-0436", # paste unmaintained
  # Transitive via reqwest/rustls ecosystem; tracked for future dependency refresh.
  "RUSTSEC-2025-0134", # rustls-pemfile unmaintained
]

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "ISC",
  "Unicode-3.0",
  "MPL-2.0",
  "Zlib",
  "CC0-1.0",
  "bzip2-1.0.6",
  "MIT-0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
