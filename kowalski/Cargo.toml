[package]
name = "kowalski"
version = "0.6.0"
edition = "2024"
description = "Kowalski: A Rust-based agent for interacting with Ollama models"
license = "MIT"
authors = ["yarenty <yarenty@gmail.com>"]
repository = "https://github.com/yarenty/kowalski"
homepage = "https://github.com/yarenty/kowalski"
readme = "README.md"
categories = [
    "network-programming",
    "text-processing",
    "science",
]
keywords = [
    "AI",
    "agent",
    "chat",
    "llm",
    "ollama",
]

[dependencies]
# Core components are non-optional
kowalski-core = { path = "../kowalski-core", version = "0.6.0" }

kowalski-tools = { path = "../kowalski-tools", version = "0.6.0" }



# Optional federation and CLI
kowalski-federation = { path = "../kowalski-federation", version = "0.6.0", optional = true }
kowalski-cli = { path = "../kowalski-cli", version = "0.6.0", optional = true }

tokio = { workspace = true }

[lib]
name = "kowalski"
path = "src/lib.rs"

[features]
default = []

# Other features
federation = ["kowalski-federation"]
cli = ["kowalski-cli"]

# All features
full = ["federation", "cli"] 