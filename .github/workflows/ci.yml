# Postgres + pgvector (default test job) and optional Apache AGE (dedicated job).

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  # GitHub Actions: prefer Node 24 for JS-based actions (see GH changelog 2025-09-19).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Markdown link check (offline)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .lychee.toml --offline --no-progress './**/*.md'

  test:
    runs-on: ubuntu-latest
    services:
      # pgvector + Postgres 16 — no Apache AGE; graph `/api/graph/cypher` stays untested here.
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: kowalski
          POSTGRES_PASSWORD: kowalski
          POSTGRES_DB: kowalski
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kowalski -d kowalski"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Clippy (default features)
        run: cargo clippy -p kowalski-core -p kowalski-cli

      - name: Test (default features)
        run: cargo test -p kowalski-core -p kowalski-cli

      - name: Test kowalski-core with postgres + pgvector
        env:
          DATABASE_URL: postgres://kowalski:kowalski@127.0.0.1:5432/kowalski
        run: |
          cargo test -p kowalski-core --features postgres -- --nocapture

      - name: Build kowalski-cli with postgres (graph Cypher route)
        run: cargo build -p kowalski-cli --features postgres

      - name: SQL migrations against CI Postgres
        env:
          DATABASE_URL: postgres://kowalski:kowalski@127.0.0.1:5432/kowalski
        run: |
          cargo run -p kowalski-cli --features postgres -- db migrate --url "$DATABASE_URL"

  # Apache AGE preinstalled — exercises `postgres_age_cypher` / `POST /api/graph/cypher` path.
  postgres-age:
    runs-on: ubuntu-latest
    services:
      postgres-age:
        image: apache/age:release_PG16_1.6.0
        env:
          POSTGRES_USER: kowalski
          POSTGRES_PASSWORD: kowalski
          POSTGRES_DB: kowalski
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kowalski -d kowalski"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Apache AGE Cypher integration test
        env:
          DATABASE_URL: postgres://kowalski:kowalski@127.0.0.1:5432/kowalski
        run: cargo test -p kowalski-core --features postgres age_cypher -- --nocapture
